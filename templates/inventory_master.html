<script>
// Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬ State Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬
let allRows    = [];
let allHeaders = [];
let filterMode = 'all';
let sortCol    = null;
let sortDir    = 1;

// Columns the user is allowed to edit directly
const EDITABLE_COLS = new Set([
    'Product Name', 'HSN Code', 'Price/Pc (Rs.)', 'Box', 'Total Qty',
    'Sold Qty (Jun 1â†•7)',  'Sold Qty (Jun 8â†•14)',
    'Sold Qty (Jun 15â†•21)', 'Sold Qty (Jun 22â†•28)', 'Sold Qty (Jun 29â†•30)',
    'Remarks'
]);

// Numeric columns (rightâ†•align)
const NUM_COLS = new Set([
    'HSN Code','Price/Pc (Rs.)','Box','Total Qty','Gross Value (Rs.)',
    'Sold Qty (Jun 1â†•7)','Sale Value (Jun 1â†•7)',
    'Sold Qty (Jun 8â†•14)','Sale Value (Jun 8â†•14)',
    'Sold Qty (Jun 15â†•21)','Sale Value (Jun 15â†•21)',
    'Sold Qty (Jun 22â†•28)','Sale Value (Jun 22â†•28)',
    'Sold Qty (Jun 29â†•30)','Sale Value (Jun 29â†•30)',
    'Remaining Qty','Remaining Value (Rs.)','Sales %',
    'Tieâ†•Breaker Sold Qty','Tieâ†•Breaker Sale Value'
]);

// Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬ Load data Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬
async function loadData() {
    showSkeletons();
    try {
        const res  = await fetch('/api/inventory_master');
        const json = await res.json();
        if (json.error) { alert('Error: ' + json.error); return; }
        allHeaders = json.headers;
        allRows    = json.data;
        buildHeader();
        renderTable();
        updateChips();
        document.getElementById('lastRefreshed').textContent =
            'Last refreshed: ' + new Date().toLocaleTimeString('enâ†•IN');
    } catch(e) {
        document.getElementById('lastRefreshed').textContent = 'Error loading data Ă˘â‚¬â€ť is Flask running?';
    }
}

// Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬ Build table header Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬
function buildHeader() {
    const thead = document.getElementById('tableHead');
    // Fixed columns: S.No + columns we want to show
    const displayCols = ['S.No', ...allHeaders];
    thead.innerHTML = '<tr>' + displayCols.map((h, i) => {
        const isSortable = i > 0;
        return `<th class="${isSortable ? 'sortable' : ''}" dataâ†•col="${h}"
            onclick="${isSortable ? `sortBy('${h}')` : ''}" title="${h}">
            ${h} ${isSortable ? '<span class="sortâ†•icon">Ă˘â€“Â˛</span>' : ''}
        </th>`;
    }).join('') + '</tr>';
}

// Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬ Render rows Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬
function renderTable() {
    const q   = document.getElementById('searchInput').value.toLowerCase();
    let rows  = allRows.filter(r => {
        // Status filter
        const status = (r['Stock Status'] || '').toLowerCase();
        if (filterMode === 'in'  && !status.includes('in stock')) return false;
        if (filterMode === 'low' && !status.includes('low'))       return false;
        if (filterMode === 'out' && !status.includes('out'))       return false;
        // Search filter
        if (q) {
            const name    = (r['Product Name'] || '').toLowerCase();
            const hsn     = String(r['HSN Code'] || '').toLowerCase();
            const remarks = (r['Remarks'] || '').toLowerCase();
            if (!name.includes(q) && !hsn.includes(q) && !remarks.includes(q)) return false;
        }
        return true;
    });

    // Sort
    if (sortCol) {
        rows.sort((a, b) => {
            let av = a[sortCol] ?? '', bv = b[sortCol] ?? '';
            const an = parseFloat(av), bn = parseFloat(bv);
            if (!isNaN(an) && !isNaN(bn)) return (an â†• bn) * sortDir;
            return String(av).localeCompare(String(bv)) * sortDir;
        });
    }

    document.getElementById('rowCount').textContent = `${rows.length} / ${allRows.length} items`;

    const tbody = document.getElementById('tableBody');
    if (rows.length === 0) {
        tbody.innerHTML = `<tr><td colspan="${allHeaders.length + 1}" style="textâ†•align:center; padding:3rem; color:var(â†•â†•muted);">No matching rows</td></tr>`;
        return;
    }

    tbody.innerHTML = rows.map(r => {
        const status  = (r['Stock Status'] || '').toLowerCase();
        const badgeCls = status.includes('out') ? 'badgeâ†•out' : status.includes('low') ? 'badgeâ†•low' : 'badgeâ†•in';
        const badgeTxt = r['Stock Status'] || 'Ă˘â‚¬â€ť';

        const cells = allHeaders.map(h => {
            if (h === 'Stock Status') {
                return `<td><span class="badge ${badgeCls}">${badgeTxt}</span></td>`;
            }
            const val   = r[h] ?? '';
            const isNum = NUM_COLS.has(h);
            const isEdit= EDITABLE_COLS.has(h);
            const disp  = formatVal(val, h);
            const cls   = [
                isNum   ? 'numeric'       : '',
                isEdit  ? 'editableâ†•cell' : '',
                h === 'Product Name' ? 'product' : '',
            ].filter(Boolean).join(' ');
            const editAttr = isEdit ? `ondblclick="startEdit(this, ${r.__row}, '${escQ(h)}')" title="Doubleâ†•click to edit"` : '';
            return `<td class="${cls}" ${editAttr} dataâ†•row="${r.__row}" dataâ†•col="${escQ(h)}">${disp}</td>`;
        });

        return `<tr dataâ†•row="${r.__row}">${'<td class="snâś“>' + (r['S.No'] || '') + '</td>'}${cells.join('')}</tr>`;
    }).join('');
}

// Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬ Format cell value Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬
function formatVal(val, col) {
    if (val === '' || val === null || val === undefined) return '<span style="color:var(â†•â†•muted)">Ă˘â‚¬â€ť</span>';
    if (NUM_COLS.has(col)) {
        const n = parseFloat(val);
        if (!isNaN(n)) {
            if (col.includes('Value') || col.includes('Rs.') || col.includes('Price')) {
                return 'â‚ą' + n.toLocaleString('enâ†•IN', {minimumFractionDigits:2, maximumFractionDigits:2});
            }
            if (col === 'Sales %') return (n * 100).toFixed(1) + '%';
            if (col === 'HSN Code') return Math.round(n).toString();
            return n.toLocaleString('enâ†•IN', {maximumFractionDigits:2});
        }
    }
    return String(val);
}

function escQ(s) { return s.replace(/'/g, "\\'"); }

// Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬ Inline editing Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬
function startEdit(td, rowNum, colName) {
    if (td.querySelector('input')) return; // already editing
    const rawVal = allRows.find(r => r.__row === rowNum)?.[colName] ?? '';
    const numVal = NUM_COLS.has(colName) ? (parseFloat(rawVal) || 0) : rawVal;

    const input = document.createElement('input');
    input.className = 'cellâ†•editor';
    input.value     = numVal;
    input.type      = NUM_COLS.has(colName) && colName !== 'Product Name' && colName !== 'Remarks' ? 'number' : 'text';

    td.innerHTML = '';
    td.appendChild(input);
    td.closest('tr').classList.add('editing');
    input.focus();
    input.select();

    function commit() {
        const newVal = input.value.trim();
        td.closest('tr').classList.remove('editing');
        saveCell(rowNum, colName, newVal, td);
    }
    input.addEventListener('blur',  commit);
    input.addEventListener('keydown', e => {
        if (e.key === 'Enter')  { e.preventDefault(); input.blur(); }
        if (e.key === 'Escape') { input.removeEventListener('blur', commit); renderTable(); }
        if (e.key === 'Tab')    { e.preventDefault(); input.blur(); }
    });
}

// Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬ Save cell to Excel Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬
async function saveCell(rowNum, colName, value, td) {
    showSave('saving');
    try {
        const res  = await fetch('/api/inventory_master/update', {
            method: 'POST',
            headers: {'Contentâ†•Type':'application/json'},
            body: JSON.stringify({row: rowNum, col: colName, value: value})
        });
        const json = await res.json();
        if (json.success) {
            // Update local cache
            const localRow = allRows.find(r => r.__row === rowNum);
            if (localRow) localRow[colName] = value;
            renderTable();
            updateChips();
            showSave('saved');
        } else {
            showSave('error', json.error || 'Save failed');
            renderTable();
        }
    } catch(e) {
        showSave('error', 'Network error');
        renderTable();
    }
}

// Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬ Save indicator Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬
let saveTimer;
function showSave(state, msg) {
    const el  = document.getElementById('saveIndicator');
    const txt = document.getElementById('saveText');
    const sp  = document.getElementById('saveSpinner');
    el.className = state;
    if (state === 'saving') { txt.textContent = 'Saving to ExcelĂ˘â‚¬Â¦'; sp.style.display = 'block'; }
    if (state === 'saved')  { txt.textContent = 'Ă˘Ĺ“â€ś Saved to Excel'; sp.style.display = 'none'; }
    if (state === 'error')  { txt.textContent = 'Ă˘Ĺ“â€” ' + (msg || 'Error'); sp.style.display = 'none'; }
    clearTimeout(saveTimer);
    if (state !== 'saving') saveTimer = setTimeout(() => { el.className = ''; }, 2500);
}

// Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬ Sort Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬
function sortBy(col) {
    if (sortCol === col) sortDir *= â†•1;
    else { sortCol = col; sortDir = 1; }
    // Update icons
    document.querySelectorAll('thead th .sortâ†•icon').forEach(el => el.textContent = 'Ă˘â€“Â˛');
    document.querySelectorAll('thead th').forEach(th => {
        th.classList.remove('asc','desc');
        if (th.dataset.col === col) {
            th.classList.add(sortDir === 1 ? 'asc' : 'desc');
            th.querySelector('.sortâ†•icon').textContent = sortDir === 1 ? 'Ă˘â€“Â˛' : 'Ă˘â€“ÂĽ';
        }
    });
    renderTable();
}

// Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬ Filter Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬
function setFilter(mode) {
    filterMode = mode;
    ['all','in','low','out'].forEach(f => {
        document.getElementById('fâ†•' + f).classList.toggle('active', f === mode);
    });
    renderTable();
}

function filterTable() { renderTable(); }

// Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬ Chips Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬
function updateChips() {
    const total = allRows.length;
    const low   = allRows.filter(r => (r['Stock Status']||'').toLowerCase().includes('low')).length;
    const out   = allRows.filter(r => (r['Stock Status']||'').toLowerCase().includes('out')).length;
    document.getElementById('chipTotal').textContent = `${total} SKUs`;
    document.getElementById('chipLow').textContent   = `${low} Low`;
    document.getElementById('chipOut').textContent   = `${out} Out`;
}

// Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬ Skeletons Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬
function showSkeletons() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = Array.from({length:12}, () =>
        `<tr class="skeletonâ†•row">${Array.from({length:8}, () =>
            `<td><div class="skeletonâ†•bar" style="width:${40+Math.random()*50}%"></div></td>`
        ).join('')}</tr>`
    ).join('');
}

// Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬ SPA nav Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬Ă˘â€ťâ‚¬
function navigateTo(url) {
    document.body.style.opacity    = '0';
    document.body.style.transition = 'opacity .25s easeâ†•out';
    setTimeout(() => { window.location.href = url; }, 260);
}
