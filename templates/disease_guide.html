<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asclepius Disease Guide</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        @keyframes fadeInSPA { from { opacity: 0; } to { opacity: 1; } }
        body {
            animation: fadeInSPA 0.3s ease-out forwards;
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background-color: #0b0f19;
            color: #ffffff;
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: rgba(255, 255, 255, 0.03);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            backdrop-filter: blur(16px);
        }

        .nav-menu { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 0.5rem; }
        .nav-item {
            padding: 1rem 1.5rem;
            border-radius: 12px;
            color: #94a3b8;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            transform: translateX(5px);
        }

        .main-content {
            flex: 1;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            overflow-y: auto;
            max-height: 100vh;
        }

        .header { display: flex; justify-content: space-between; align-items: center; }
        .header-title h1 { margin: 0; font-size: 2.25rem; font-weight: 600; }
        
        /* Search Bar */
        .search-container {
            width: 100%;
            max-width: 600px;
            position: relative;
        }
        .search-input {
            width: 100%;
            padding: 1rem 1.5rem;
            padding-left: 3rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-family: 'Outfit', sans-serif;
            outline: none;
            transition: border-color 0.3s;
        }
        .search-input:focus { border-color: #6366f1; }
        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        /* Results Grid */
        .results-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .disease-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: transform 0.2s, background 0.2s;
        }
        .disease-card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.05);
        }

        .d-cat { font-size: 0.8rem; color: #6366f1; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .d-name { font-size: 1.5rem; font-weight: 600; margin: 0; color: #fff; }
        
        .section-title { font-size: 0.9rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 0.5rem; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.25rem;}
        .products-list, .tips-list { list-style: none; padding: 0; margin: 0; font-size: 0.95rem; color: #cbd5e1; }
        .products-list li { margin-bottom: 0.5rem; background: rgba(0,0,0,0.2); padding: 0.5rem; border-radius: 8px; }
        .p-name { font-weight: 600; color: #10b981; }
        .p-dose { font-size: 0.85rem; color: #94a3b8; display: block;}
        
        .disclaimer {
            background: rgba(244, 63, 94, 0.1);
            color: #fb7185;
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-top: auto;
            border: 1px solid rgba(244, 63, 94, 0.2);
        }
        
        .avoid {
            color: #fb7185;
            font-size: 0.9rem;
        }

        @media(max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; padding: 1rem; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); gap: 1rem; box-sizing: border-box; }
            .nav-menu { flex-direction: row; overflow-x: auto; }
            .nav-item { padding: 0.8rem; flex-shrink: 0; }
            .main-content { padding: 1rem; width: 100%; box-sizing: border-box; }
            .results-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo" style="text-align: center; padding: 1rem 0;">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Asclepius Wellness" style="max-width: 85%; height: auto; background: linear-gradient(135deg, #fff 0%, #dce1eb 100%); border-radius: 16px; padding: 12px;">
        </div>
        <ul class="nav-menu">
            <li class="nav-item" onclick="navigateTo('/')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
                Dashboard
            </li>
            <li class="nav-item" onclick="navigateTo('/inventory')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></svg>
                Inventory Stock
            </li>
            <li class="nav-item" onclick="navigateTo('/inventory_master')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                Inventory Master
            </li>
            <li class="nav-item" onclick="navigateTo('/invoice')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                Invoice Generator
            </li>
            <li class="nav-item" onclick="navigateTo('/invoice_history')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                Recent Invoices
            </li>
            <li class="nav-item active" onclick="navigateTo('/disease_guide')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                Disease Guide
            </li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="header">
            <div class="header-title">
                <h1>Master Disease Guide</h1>
            </div>
        </header>

        <div class="search-container">
            <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="searchInput" class="search-input" placeholder="Search for a disease or condition (e.g. Asthma, Diabetes)..." onkeyup="filterDiseases()">
        </div>

        <div class="results-container" id="resultsContainer">
            <!-- Cards injected via JS -->
        </div>
    </main>

    <script>
        function navigateTo(url) {
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.3s ease-out';
            setTimeout(() => { window.location.href = url; }, 300);
        }

        let allDiseases = [];

        async function loadData() {
            try {
                const res = await fetch('/static/master_review_data_perfected.json');
                const data = await res.json();
                
                // Flatten the categories into a single array
                for (const [category, diseases] of Object.entries(data)) {
                    diseases.forEach(d => {
                        d.category_name = category;
                        allDiseases.push(d);
                    });
                }
                renderCards(allDiseases);
            } catch(e) {
                console.error("Failed to load disease data", e);
                document.getElementById('resultsContainer').innerHTML = "<p>Error loading data.</p>";
            }
        }

        function renderCards(list) {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = '';
            
            if(list.length === 0) {
                container.innerHTML = '<p style="color: #94a3b8; font-size: 1.1rem;">No matching diseases found.</p>';
                return;
            }

            list.forEach(d => {
                const name = d.disease_name || d.name || 'Unknown';
                const cat = d.category_name;
                const products = d.final_recommended_products || d.recommended_wellness_products || [];
                const disclaimer = d.disclaimer || '';
                const avoid = Array.isArray(d.things_to_avoid) ? d.things_to_avoid.join(' | ') : (d.things_to_avoid || '');
                const tip = d.ayurvedic_tip || '';
                const diet = Array.isArray(d.diet) ? d.diet.map(item => `<li>• ${item}</li>`).join('') : (d.diet || '');
                const exercise = Array.isArray(d.exercise) ? d.exercise.map(item => `<li>• ${item}</li>`).join('') : (d.exercise || '');

                let prodsHtml = products.map(p => {
                    const pName = typeof p === 'string' ? p : (p.product || p.name || p.product_name);
                    const pDose = p.dosage || p.how_to_take || 'As directed';
                    return `<li><span class="p-name">${pName}</span><span class="p-dose">${pDose}</span></li>`;
                }).join('');

                if(!prodsHtml) prodsHtml = '<li>No specific products listed.</li>';

                let dietHtml = diet ? `<div><div class="section-title">Recommended Diet</div><ul style="list-style:none; padding:0; margin:0; font-size:0.9rem; color:#cbd5e1; margin-bottom: 0.5rem;">${diet}</ul></div>` : '';
                let exerciseHtml = exercise ? `<div><div class="section-title">Exercise Protocol</div><ul style="list-style:none; padding:0; margin:0; font-size:0.9rem; color:#cbd5e1; margin-bottom: 0.5rem;">${exercise}</ul></div>` : '';

                let discHtml = disclaimer ? `<div class="disclaimer">⚠️ ${disclaimer}</div>` : '';
                let avoidHtml = avoid ? `<div><div class="section-title">Things to Avoid</div><div class="avoid">${avoid}</div></div>` : '';
                let tipHtml = tip ? `<div><div class="section-title">Ayurvedic Tip</div><div style="font-size:0.9rem; color: #38bdf8;">${tip}</div></div>` : '';

                const card = document.createElement('div');
                card.className = 'disease-card';
                card.innerHTML = `
                    <div>
                        <div class="d-cat">${cat}</div>
                        <h3 class="d-name">${name}</h3>
                    </div>
                    <div>
                        <div class="section-title">Recommended Products</div>
                        <ul class="products-list">${prodsHtml}</ul>
                    </div>
                    ${dietHtml}
                    ${exerciseHtml}
                    ${tipHtml}
                    ${avoidHtml}
                    ${discHtml}
                `;
                container.appendChild(card);
            });
        }

        function filterDiseases() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allDiseases.filter(d => {
                const name = (d.disease_name || d.name || '').toLowerCase();
                const cat = (d.category_name || '').toLowerCase();
                return name.includes(query) || cat.includes(query);
            });
            renderCards(filtered);
        }

        loadData();
    </script>
</body>
</html>
