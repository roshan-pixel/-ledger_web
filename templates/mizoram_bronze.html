<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mizoram Bronze 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, var(--bg-color));
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-back {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .table-container {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            padding: 1rem;
            overflow-x: auto;
            max-height: calc(100vh - 150px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
            white-space: nowrap;
        }

        th {
            font-weight: 600;
            color: var(--text-muted);
            position: sticky;
            top: 0;
            background: #1e293b;
            z-index: 10;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.05);
        }

        .badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .badge-yes { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .badge-no { background: rgba(239, 68, 68, 0.2); color: #f87171; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Mizoram Bronze 2026</h1>
        <a href="/" class="btn-back">← Back to Dashboard</a>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>DS ID</th>
                    <th>DS Name</th>
                    <th>Bronze Comm</th>
                    <th>Bronze Achieved</th>
                    <th>Bronze Date</th>
                    <th>Silver Comm</th>
                    <th>Silver Achieved</th>
                    <th>Silver Date</th>
                    <th>Gold Comm</th>
                    <th>Gold Achieved</th>
                    <th>Gold Date</th>
                    <th>Platinum Comm</th>
                    <th>Platinum Achieved</th>
                    <th>Platinum Date</th>
                    <th>Phone No.</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="15" style="text-align:center; color: var(--text-muted);">Loading...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        async function loadData() {
            try {
                const res = await fetch('/api/mizoram_bronze');
                const data = await res.json();
                
                const tbody = document.getElementById('tableBody');
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="15" style="text-align:center; color: var(--text-muted);">No data available</td></tr>';
                    return;
                }

                const formatAchieved = (val) => {
                    val = val ? val.toString().trim() : '';
                    if (val.toUpperCase() === 'YES') {
                        return `<span class="badge badge-yes">YES</span>`;
                    } else if (val.toUpperCase() === 'NO') {
                        return `<span class="badge badge-no">NO</span>`;
                    }
                    return val;
                };

                const rowsHtml = data.map(r => `
                    <tr>
                        <td><strong>${r.ds_id || ''}</strong></td>
                        <td>${r.ds_name || ''}</td>
                        <td>${r.bronze_commission || ''}</td>
                        <td>${formatAchieved(r.bronze_achieved)}</td>
                        <td>${r.mizoram_bronze_date || ''}</td>
                        <td>${r.silver_commission || ''}</td>
                        <td>${formatAchieved(r.silver_achieved)}</td>
                        <td>${r.silver_update_date || ''}</td>
                        <td>${r.gold_commission || ''}</td>
                        <td>${formatAchieved(r.gold_achieved)}</td>
                        <td>${r.gold_update_date || ''}</td>
                        <td>${r.platinum_commission || ''}</td>
                        <td>${formatAchieved(r.platinum_achieved)}</td>
                        <td>${r.platinum_update_date || ''}</td>
                        <td>${r.phone_no || ''}</td>
                    </tr>
                `).join('');
                
                tbody.innerHTML = rowsHtml;
            } catch(e) {
                console.error(e);
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="15" style="text-align:center; color: #ef4444;">Failed to load data</td></tr>';
            }
        }
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
