<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Recent Invoices — Nexus Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        @keyframes fadeInSPA { from{opacity:0} to{opacity:1} }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

        *, *::before, *::after { box-sizing: border-box; }

        :root {
            --bg:        #0b0f19;
            --surface:   rgba(255,255,255,0.04);
            --surface2:  rgba(255,255,255,0.07);
            --border:    rgba(255,255,255,0.09);
            --primary:   #6366f1;
            --primary-g: rgba(99,102,241,0.3);
            --green:     #10b981;
            --yellow:    #f59e0b;
            --red:       #ef4444;
            --text:      #ffffff;
            --muted:     #94a3b8;
            --blur:      blur(16px);
        }

        body {
            margin:0; padding:0;
            font-family:'Outfit',sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(99,102,241,.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(236,72,153,.15),  transparent 25%);
            background-attachment:fixed;
            color:var(--text);
            min-height:100vh;
            display:flex;
            animation:fadeInSPA .3s ease-out forwards;
        }

        /* ── SIDEBAR ─────────────────────── */
        .sidebar {
            width:260px; flex-shrink:0;
            background:var(--surface);
            border-right:1px solid var(--border);
            backdrop-filter:var(--blur);
            padding:2rem 1.5rem;
            display:flex; flex-direction:column; gap:2rem;
            position:sticky; top:0; height:100vh; overflow-y:auto;
        }
        .logo {
            font-size:1.4rem; font-weight:700;
            background:linear-gradient(to right,#fff,#94a3b8);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            letter-spacing:-0.5px;
        }
        .nav-menu { list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:.4rem; }
        .nav-item {
            padding:.85rem 1.2rem; border-radius:12px;
            color:var(--muted); font-weight:500; cursor:pointer;
            transition:all .25s; display:flex; align-items:center; gap:.85rem; font-size:.95rem;
        }
        .nav-item:hover { background:rgba(255,255,255,.08); color:var(--text); transform:translateX(4px); }
        .nav-item.active { background:rgba(99,102,241,.15); color:var(--primary); transform:translateX(4px); }

        /* ── MAIN ────────────────────────── */
        .main { flex:1; padding:2.5rem; overflow-y:auto; }
        
        .header { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:2rem; }
        .title h1 {
            margin:0; font-size:2.5rem; font-weight:700; letter-spacing:-1px;
            background:linear-gradient(135deg,#fff,#94a3b8);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        }
        .title p { margin:.4rem 0 0; color:var(--muted); font-size:1.05rem; }

        /* ── TABLE ───────────────────────── */
        .card {
            background:var(--surface); border:1px solid var(--border);
            border-radius:20px; backdrop-filter:var(--blur);
            padding:1.5rem; overflow-x:auto;
        }
        table { width:100%; border-collapse:separate; border-spacing:0 .45rem; }
        thead th {
            text-align:left; padding:.5rem .75rem;
            color:var(--muted); font-size:.78rem; font-weight:600;
            text-transform:uppercase; letter-spacing:1px;
            border-bottom:1px solid var(--border);
        }
        tbody tr { background:var(--surface2); transition:background .2s; }
        tbody tr:hover { background:rgba(255,255,255,.1); }
        tbody td { padding:.8rem .75rem; font-size:.92rem; }
        tbody td:first-child { border-radius:10px 0 0 10px; }
        tbody td:last-child  { border-radius:0 10px 10px 0; }
        
        .inv-no { color:var(--primary); font-weight:600; }
        .amt { font-family:monospace; font-size:1.05rem; }
        
        .status {
            font-size:.75rem; font-weight:600; padding:.25rem .6rem;
            border-radius:20px; display:inline-block; letter-spacing:.5px; text-transform:uppercase;
        }
        .status.active { background:rgba(16,185,129,.15); color:var(--green); border:1px solid rgba(16,185,129,.3); }
        .status.cancelled { background:rgba(239,68,68,.15); color:var(--red); border:1px solid rgba(239,68,68,.3); }

        .btn-cancel {
            background:rgba(239,68,68,.1); color:var(--red); border:1px solid rgba(239,68,68,.3);
            padding:.4rem .8rem; border-radius:8px; font-family:'Outfit',sans-serif;
            font-size:.8rem; font-weight:600; cursor:pointer; transition:all .2s;
        }
        .btn-cancel:hover { background:var(--red); color:#fff; }
        .btn-cancel:disabled { opacity:.4; cursor:not-allowed; background:rgba(239,68,68,.1); color:var(--red); }

        /* ── TOAST ───────────────────────── */
        #toast {
            position:fixed; bottom:2rem; right:2rem;
            padding:1rem 1.75rem; border-radius:12px;
            font-weight:600; color:#fff; z-index:9999;
            opacity:0; transform:translateY(16px);
            transition:all .3s; pointer-events:none;
        }
        #toast.show { opacity:1; transform:translateY(0); }
        #toast.success { background:linear-gradient(135deg,#10b981,#059669); }
        #toast.error   { background:linear-gradient(135deg,#ef4444,#dc2626); }
    
        
        /* ── MOBILE OPTIMIZATION ───────────────── */
        @media(max-width: 768px) {
            /* Structural Fixes */
            body { flex-direction: column !important; }
            .sidebar { width: 100% !important; height: auto !important; position: relative !important; padding: 1rem !important; border-right: none !important; border-bottom: 1px solid var(--border) !important; flex-shrink: 0; gap: 1rem !important; }
            
            /* Top Navigation Conversion */
            .nav-menu { flex-direction: row !important; flex-wrap: nowrap !important; overflow-x: auto !important; justify-content: flex-start !important; padding-bottom: 0.5rem; -webkit-overflow-scrolling: touch; }
            .nav-item { padding: 0.8rem 1.2rem !important; font-size: 1rem !important; gap: 0.5rem !important; min-height: 44px; flex-shrink: 0; }
            
            /* Container Padding Fixes (covers all classes) */
            .main, .main-content { padding: 1rem !important; width: 100% !important; overflow-x: hidden !important; box-sizing: border-box !important; }
            .card, .glass-panel, .sync-card, .results-card, .auto-card, .kpi-card { padding: 1rem !important; border-radius: 16px !important; box-sizing: border-box !important; width: 100% !important; }
            
            /* Header & Layout Fixes */
            .inv-header, .header-actions, .header { flex-direction: column !important; align-items: flex-start !important; gap: 1rem !important; }
            .inv-title h1, h1 { font-size: 2rem !important; }
            
            /* Forms, Inputs & iOS Zoom Fix */
            .ds-lookup-row, .filters { flex-direction: column !important; align-items: stretch !important; gap: 1rem !important; }
            .ds-lookup-row .glass-input, .filter-input, .filter-select, .glass-input { flex: 1 !important; width: 100% !important; box-sizing: border-box !important; }
            input, select, textarea { font-size: 16px !important; } /* Prevents iOS Keyboard Zoom */
            
            /* Grid & Table Breakpoints */
            .billing-grid, .kpi-grid { grid-template-columns: 1fr !important; }
            .table-wrap, .table-container { width: 100% !important; overflow-x: auto !important; -webkit-overflow-scrolling: touch !important; padding-bottom: 1rem; }
            table { white-space: nowrap !important; }
            thead th { font-size: 0.85rem !important; }
            /* .total-row width removed for layout fix */
            
            /* Touch Target Accessibility (Min 44px) */
            .btn, .lookup-btn, .sync-btn { min-height: 44px; padding: 0.8rem 1.5rem !important; width: 100%; text-align: center; justify-content: center; }
            .btn-cancel, .remove-btn, .preset-btn, .filter-btn, .refresh-btn { min-height: 44px; padding: 0.8rem 1.2rem !important; font-size: 1rem !important; }
            
            /* Fixed Elements */
            #saveIndicator { bottom: 5rem !important; right: 1rem !important; padding: 0.8rem 1.2rem !important; }
            
            /* Contrast Fixes */
            .log-card { overflow-x: auto; color: #cbd5e1 !important; background: rgba(0,0,0,0.6) !important; }
            label, thead th { color: #cbd5e1 !important; }
            .glass-input { border-color: rgba(255,255,255,0.2) !important; }
        }

</style>
</head>
<body>

<!-- ── SIDEBAR ─────────────────────────────── -->
<aside class="sidebar">
    <div class="logo" style="text-align: center; padding: 1rem 0;">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Asclepius Wellness" style="max-width: 85%; height: auto; background: linear-gradient(135deg, rgba(255,255,255,1) 0%, rgba(220,225,235,1) 100%); border-radius: 16px; padding: 12px; box-shadow: 0 8px 32px rgba(99, 102, 241, 0.15), inset 0 0 0 1px rgba(255,255,255,0.5);">
    </div>
    <ul class="nav-menu">
        <li class="nav-item" onclick="navigateTo('/')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
            Dashboard
        </li>
        <li class="nav-item" onclick="navigateTo('/inventory')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
            Inventory Stock
        </li>
        <li class="nav-item" onclick="navigateTo('/inventory_master')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            Inventory Master
        </li>
        <li class="nav-item" onclick="navigateTo('/invoice')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
            Invoice Generator
        </li>
        <li class="nav-item active" onclick="navigateTo('/invoice_history')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
            Recent Invoices
        </li>
    </ul>
</aside>

<!-- ── MAIN ────────────────────────────────── -->
<main class="main">
    <div class="header">
        <div class="title">
            <h1>Recent Invoices</h1>
            <p>Manage and cancel generated invoices.</p>
        </div>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Invoice No</th>
                    <th>Date</th>
                    <th>DS Code</th>
                    <th>Customer Name</th>
                    <th>Amount (₹)</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="historyBody">
                <tr><td colspan="7" style="text-align:center; color:var(--muted); padding:2rem;">Loading history...</td></tr>
            </tbody>
        </table>
    </div>
</main>

<div id="toast"></div>

<script>
    async function loadHistory() {
        try {
            const res = await fetch('/api/invoice/list');
            const data = await res.json();
            const tbody = document.getElementById('historyBody');
            tbody.innerHTML = '';
            
            if (!data.invoices || data.invoices.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:var(--muted); padding:2rem;">No invoices generated yet.</td></tr>';
                return;
            }
            
            data.invoices.forEach(inv => {
                const tr = document.createElement('tr');
                const isCancelled = inv.status === 'cancelled';
                
                let dateStr = inv.date_created;
                try {
                    if (dateStr.includes('T')) {
                        dateStr = new Date(dateStr).toLocaleDateString('en-IN');
                    }
                } catch(e) {}
                
                tr.innerHTML = `
                    <td class="inv-no">${inv.invoice_no || '-'}</td>
                    <td>${dateStr}</td>
                    <td>${inv.ds_code || '-'}</td>
                    <td>${inv.customer_name || '-'}</td>
                    <td class="amt">${parseFloat(inv.amount || 0).toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2})}</td>
                    <td><span class="status ${inv.status || 'active'}">${inv.status || 'active'}</span></td>
                    <td>
                        <button class="btn-cancel" onclick="cancelInvoice(${inv.id})" ${isCancelled ? 'disabled' : ''}>
                            ${isCancelled ? 'Cancelled' : 'Cancel'}
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } catch (e) {
            document.getElementById('historyBody').innerHTML = '<tr><td colspan="7" style="text-align:center; color:var(--red); padding:2rem;">Failed to load data.</td></tr>';
        }
    }
    
    async function cancelInvoice(id) {
        if (!confirm('Are you sure you want to cancel this invoice? This will restore the items back into inventory.')) return;
        
        try {
            const res = await fetch('/api/invoice/cancel/' + id, { method: 'POST' });
            const data = await res.json();
            
            if (res.ok) {
                showToast(data.message || 'Invoice cancelled successfully', 'success');
                loadHistory(); // reload table
            } else {
                showToast(data.error || 'Failed to cancel', 'error');
            }
        } catch(e) {
            showToast('Network error', 'error');
        }
    }

    // ── Toast ──────────────────────────────────────────
    let toastTimer;
    function showToast(msg, type='success') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className   = `show ${type}`;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => { t.className = ''; }, 3200);
    }

    // ── SPA nav ────────────────────────────────────────
    function navigateTo(url) {
        document.body.style.opacity    = '0';
        document.body.style.transition = 'opacity .25s ease-out';
        setTimeout(() => { window.location.href = url; }, 260);
    }
    
    loadHistory();
</script>
</body>
</html>
